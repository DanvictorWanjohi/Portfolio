<!DOCTYPE html>

<body>
    <form action="index.html">
    
    <h1>Sign Up page</h1>
    <p><label for="">First Name</label><br>

    <p><label for="">Second Name</label><br>
    <input type="text" required></p>
    <p><label for="">Email</label><br>

    <p><label for="">Password</label><br>

    <p><label for="">Confirm Password</label><br>
    <input type="password" placeholder="******" required></p>
     <h2>Gender</h2>

    <p><input type="radio" name="gender" id="male">
    <label for="male">Male</label><br></p>
     <p><input type="radio" name="gender" id="female">
     <label for="female">Female</label><br></p>
     <p><input type="radio" name="gender" id="other">
     <label for="other">Other</label><br></p>
     </div>
     <select name="" id="">
        <option value="">----------</option>
        <option value="">Monday</option>
        <option value="">Tuesday</option>
        <option value="">Wednesday</option>
        <option value="">Thursday</option>
        <option value="">Friday</option>
     </select>
     <hr>
     <button>Sign Up</button>
    
    
    </form>
    <label for="">Your message</label>
    <textarea name="" id="" rows="4"></textarea>
